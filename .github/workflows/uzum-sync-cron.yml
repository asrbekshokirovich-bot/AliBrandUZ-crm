name: Unified Marketplace Analytics Sync

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  sync_orders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js dotenv

      # ✅ Only 2 secrets needed — all API keys live in Supabase DB
      # To update marketplace tokens: Supabase → Table Editor → marketplace_stores → api_key column
      - name: Run Unified Marketplace Sync
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: node scripts/uzum-shadow-sync.js
